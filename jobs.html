<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Opportunities</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>Job Opportunities</h1>

        <p class="subtitle">
            Explore real-time job openings based on your skills and career goals
        </p>

        <div class="card">

            <h2>Find Available Jobs</h2>

            <p>
                Click the button below to load the latest job opportunities.
            </p>

            <button onclick="fetchJobs()">
                💼 Show Live Jobs
            </button>

        </div>

        <div id="jobMarketSection">

            <h2>Available Jobs</h2>

            <div id="jobResults">
                <p>
                    Click "Show Live Jobs" to view opportunities.
                </p>
            </div>

        </div>

        <br>

        <button onclick="window.location.href='index.html'">
            ← Back to Career Analyzer
        </button>

    </div>

    <script src="script.js"></script>

</body>

</html>
